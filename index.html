<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360 Sanal Tur Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        #panorama { width: 100%; height: 100vh; }
        body { margin: 0; }
        
        /* Özel İkon Tasarımı */
        .custom-hotspot {
            height: 30px;
            width: 30px;
            background: #fff;
            border: 2px solid #333;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .custom-hotspot:after {
            content: "↑"; /* Ok işareti veya istediğin bir karakter */
            color: #333;
        }
    </style>
</head>
<body>

<div id="panorama"></div>

<script>
pannellum.viewer('panorama', {   
    "default": {
        "firstScene": "salon",
        "author": "Senin Adın",
        "sceneFadeDuration": 1000,
        "autoLoad": true,
        "hotSpotDebug": true,
        "autoRotate": -2 // Otomatik yavaş dönüş ekledik
    },

    "scenes": {
        "salon": {
            "title": "Salon",
            "panorama": "salon.jpg",
            "hotSpots": [
                {
                    "pitch": 515,
                    "yaw": 880,
                    "type": "scene",
                    "text": "Mutfağa Geç",
                    "sceneId": "mutfak",
                    "createTooltipArgs": "Mutfağa Geç",
                    "cssClass": "custom-hotspot" // Özel stilimizi burada çağırdık
                }
            ]
        },

        "mutfak": {
            "title": "Mutfak",
            "panorama": "mutfak.jpg",
            "hotSpots": [
                {
                    "pitch": -5,
                    "yaw": 110,
                    "type": "scene",
                    "text": "Salona Dön",
                    "sceneId": "salon",
                    "cssClass": "custom-hotspot"
                },
                {
                    "pitch": -2,
                    "yaw": -45,
                    "type": "scene",
                    "text": "Yatak Odasına Git",
                    "sceneId": "yatak_odasi",
                    "cssClass": "custom-hotspot"
                }
            ]
        },

        "yatak_odasi": {
            "title": "Yatak Odası",
            "panorama": "yatak_odasi.jpg",
            "hotSpots": [
                {
                    "pitch": -8,
                    "yaw": 0,
                    "type": "scene",
                    "text": "Mutfağa Dön",
                    "sceneId": "mutfak",
                    "cssClass": "custom-hotspot"
                }
            ]
        }
    }
});
</script>

</body>
</html>
