<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3ds Max Sanal Tur</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        #panorama { width: 100%; height: 100vh; }
        body { margin: 0; }
    </style>
</head>
<body>

<div id="panorama"></div>

<script>
pannellum.viewer('panorama', {   
    "default": {
        "firstScene": "salon",
        "author": "Senin Adın",
        "sceneFadeDuration": 1000,
        "autoLoad": true
    },

    "scenes": {
        "salon": {
            "title": "Salon",
            "hfov": 110,
            "pitch": -3,
            "yaw": 117,
            "type": "equirectangular",
            "panorama": "salon.jpg",
            "hotSpots": [
                {
                    "pitch": -10, // Dikey konum
                    "yaw": 150,   // Yatay konum
                    "type": "scene",
                    "text": "Mutfağa Git",
                    "sceneId": "mutfak"
                }
            ]
        },

        "mutfak": {
            "title": "Mutfak",
            "hfov": 110,
            "yaw": 5,
            "type": "equirectangular",
            "panorama": "mutfak.jpg",
            "hotSpots": [
                {
                    "pitch": -5,
                    "yaw": 110,
                    "type": "scene",
                    "text": "Salona Dön",
                    "sceneId": "salon"
                }
            ]
        }
    }
});
</script>

</body>
</html>
